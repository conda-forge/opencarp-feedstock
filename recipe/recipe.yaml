schema_version: 1

context:
  version: 19.0.0
  version_xy: ${{ (version | split('.'))[:2] | join('.') }}
  build: 0

package:
  name: opencarp
  version: ${{ version }}

source:
  url: https://git.opencarp.org/openCARP/openCARP/-/archive/v${{ version_xy }}/openCARP-v${{ version_xy }}.tar.bz2
  sha256: bac9780393b3ce204a7bda39bc1c06976707ec145c27f16c99720fbe62c29a6d
  patches:
    # MR 443, petsc 3.25 compatibility
    - 443.patch

build:
  number: ${{ build }}
  skip: win

requirements:
  build:
    - git
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - make
    - gengetopt
    - pkg-config
    - python ${{ python_min }}.*
  host:
    - fftw
    - libblas
    - liblapack
    - ${{ mpi }}
    - petsc
    - zlib
  run:
    - python
  run_exports:
    - ${{ pin_subpackage("opencarp", upper_bound="x.x") }}

tests:
  - script:
      - bench

about:
  license: LicenseRef-AcademicPublicLicense
  license_file: LICENSE.md
  summary: Cardiac Electrophysiology Simulator
  homepage: https://opencarp.org
  repository: https://git.opencarp.org/openCARP/openCARP

extra:
  recipe-maintainers:
    - minrk
